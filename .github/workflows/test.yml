name: Build Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u BrentSchoeters --password-stdin

      - name: Build image
        run: docker build -t ghcr.io/brentschoeters/skills2-2:${GITHUB_SHA} .

      - name: Push image
        run: docker push ghcr.io/brentschoeters/skills2-2:${GITHUB_SHA}

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: BrentSchoeters/skills2-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update deployment image
        run: |
          cd gitops

          sed -i "s|image: ghcr.io/brentschoeters/skills2-2:.*|image: ghcr.io/brentschoeters/skills2-2:${GITHUB_SHA}|" klant1/deployment.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add klant1/deployment.yaml
          git commit -m "update image to ${GITHUB_SHA}" || echo "No changes"

          git push
